<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITO 메타버스 오피스 v3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Galmuri11:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;overflow:hidden;background:#2a2a3e;user-select:none;}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;}

/* ═══ TOPBAR ═══ */
.topbar{height:48px;background:rgba(30,30,48,.95);backdrop-filter:blur(12px);display:flex;align-items:center;padding:0 18px;gap:14px;z-index:100;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.topbar-logo{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;letter-spacing:-.3px;}
.topbar-logo .logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#6C5CE7,#a29bfe);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.topbar-center{flex:1;display:flex;justify-content:center;gap:6px;}
.topbar-pill{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#94a3b8;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:5px;}
.topbar-pill:hover{background:rgba(108,92,231,.15);color:#a29bfe;border-color:rgba(108,92,231,.3);}
.topbar-pill.active{background:rgba(108,92,231,.2);color:#a29bfe;border-color:rgba(108,92,231,.4);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.online-badge{background:rgba(93,200,120,.12);color:#5DC878;font-size:11px;padding:5px 12px;border-radius:20px;font-weight:600;display:flex;align-items:center;gap:5px;}
.online-dot{width:6px;height:6px;background:#5DC878;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.7);}}
.inbox-btn{position:relative;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#94a3b8;width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:15px;}
.inbox-btn:hover{background:rgba(108,92,231,.15);color:#a29bfe;}
.inbox-btn .badge{position:absolute;top:-3px;right:-3px;background:#E91E63;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;line-height:1.3;}
.avatar-btn{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6C5CE7,#a29bfe);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;border:2px solid rgba(255,255,255,.1);transition:all .2s;}
.avatar-btn:hover{border-color:#a29bfe;transform:scale(1.08);}

/* ═══ MAIN ═══ */
.main-area{flex:1;display:flex;overflow:hidden;position:relative;}
.map-container{flex:1;position:relative;overflow:hidden;background:#6b8f71;}
.map-viewport{position:absolute;width:1800px;height:1200px;image-rendering:pixelated;}

/* ═══ GROUND ═══ */
.ground{position:absolute;top:0;left:0;width:100%;height:100%;}

/* ═══ ROOMS ═══ */
.room{position:absolute;border-radius:2px;overflow:hidden;box-shadow:0 2px 0 rgba(0,0,0,.15);}
.room-floor{width:100%;height:100%;position:absolute;top:0;left:0;}
.room-label{position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:#fff;padding:3px 12px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap;z-index:15;pointer-events:none;backdrop-filter:blur(4px);}
.team-label{position:absolute;top:-22px;left:10px;background:rgba(0,0,0,.5);color:#fff;padding:2px 10px;border-radius:8px;font-size:10px;font-weight:600;white-space:nowrap;z-index:15;pointer-events:none;}

/* ═══ WALLS ═══ */
.wall-h{position:absolute;height:8px;background:linear-gradient(180deg,#8899aa,#6b7b8d);border-radius:1px;z-index:3;box-shadow:0 2px 0 rgba(0,0,0,.1);}
.wall-v{position:absolute;width:8px;background:linear-gradient(90deg,#8899aa,#6b7b8d);border-radius:1px;z-index:3;box-shadow:2px 0 0 rgba(0,0,0,.1);}
.wall-top{background:linear-gradient(180deg,#7a8a9a,#5d6d7d);}

/* ═══ FURNITURE (Gather-style) ═══ */
.desk{position:absolute;z-index:4;}
.desk-wood{width:84px;height:46px;background:linear-gradient(180deg,#dbb88a,#c4a06e);border:2px solid #b8904e;border-radius:4px;box-shadow:0 3px 0 #a07844,inset 0 1px 0 rgba(255,255,255,.2);}
.desk-top{position:absolute;top:3px;left:3px;right:3px;bottom:6px;background:linear-gradient(180deg,#e8cca0,#d4b888);border-radius:2px;}
.monitor{position:absolute;z-index:5;}
.monitor-body{width:28px;height:22px;background:linear-gradient(180deg,#2a2a3e,#1e1e30);border:2px solid #444;border-radius:3px;box-shadow:0 2px 0 #222;}
.monitor-screen{position:absolute;top:2px;left:2px;right:2px;bottom:4px;border-radius:1px;animation:screenGlow 3s infinite alternate;}
@keyframes screenGlow{0%{background:#4fc3f7;}50%{background:#81d4fa;}100%{background:#29b6f6;}}
.monitor-stand{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:8px;height:4px;background:#555;border-radius:0 0 2px 2px;}
.chair{position:absolute;z-index:4;}
.chair-seat{width:24px;height:24px;background:radial-gradient(circle,#666,#555);border-radius:50%;border:2px solid #444;box-shadow:0 2px 0 #333;}
.chair-back{position:absolute;top:-6px;left:4px;width:16px;height:8px;background:#555;border-radius:4px 4px 0 0;border:1px solid #444;}
.round-table{position:absolute;z-index:4;background:radial-gradient(circle,#f0f0f0,#ddd);border:3px solid #bbb;border-radius:50%;box-shadow:0 4px 0 rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.5);}
.sofa{position:absolute;z-index:4;border-radius:8px;box-shadow:0 3px 0 rgba(0,0,0,.15);}
.sofa-h{width:76px;height:34px;background:linear-gradient(180deg,#8b7bc4,#7c6bc4);border:2px solid #6C5CE7;}
.sofa-v{width:34px;height:76px;background:linear-gradient(90deg,#8b7bc4,#7c6bc4);border:2px solid #6C5CE7;}
.sofa-cushion{position:absolute;top:4px;left:4px;right:4px;bottom:4px;background:rgba(255,255,255,.08);border-radius:4px;}
.whiteboard{position:absolute;z-index:5;background:linear-gradient(180deg,#f5f5f5,#e8e8e8);border:3px solid #bbb;border-radius:3px;box-shadow:0 2px 0 rgba(0,0,0,.1);}
.whiteboard-content{position:absolute;top:3px;left:3px;right:3px;bottom:3px;border:1px dashed #ccc;border-radius:1px;}
.tv-screen{position:absolute;z-index:5;background:#111;border:3px solid #333;border-radius:3px;box-shadow:0 2px 0 #000;overflow:hidden;}
.tv-glow{position:absolute;top:2px;left:2px;right:2px;bottom:2px;background:linear-gradient(135deg,#1a3a5c,#0a1a2c);border-radius:1px;}
.bookshelf{position:absolute;z-index:5;}
.bookshelf-frame{width:54px;height:40px;background:linear-gradient(180deg,#a07030,#8B6914);border:2px solid #6d5310;border-radius:2px;box-shadow:0 2px 0 rgba(0,0,0,.15);}
.books{position:absolute;top:3px;left:3px;display:flex;gap:1px;}
.book{height:14px;border-radius:1px;}
.vending{position:absolute;z-index:5;width:30px;height:44px;background:linear-gradient(180deg,#e74c3c,#c0392b);border:2px solid #a93226;border-radius:4px;box-shadow:0 3px 0 rgba(0,0,0,.15);}
.vending-slot{position:absolute;top:6px;left:4px;right:4px;height:20px;background:#1a1a2e;border-radius:2px;}

/* ═══ PLANTS (detailed) ═══ */
.plant{position:absolute;z-index:6;}
.plant-lg{position:absolute;z-index:6;}

/* ═══ ZONE ═══ */
.zone{position:absolute;z-index:2;border-radius:6px;cursor:pointer;transition:all .2s;}
.zone:hover{outline:3px solid rgba(108,92,231,.5);outline-offset:2px;background:rgba(108,92,231,.04);}
.zone-indicator{position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:rgba(108,92,231,.92);color:#fff;padding:4px 12px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;backdrop-filter:blur(4px);box-shadow:0 4px 12px rgba(108,92,231,.3);}
.zone:hover .zone-indicator{opacity:1;}

/* ═══ CHARACTERS ═══ */
.player{position:absolute;z-index:50;pointer-events:none;filter:drop-shadow(0 3px 2px rgba(0,0,0,.25));}
.player-name{position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:rgba(108,92,231,.9);color:#fff;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(108,92,231,.3);}
.player-name .green-dot{width:6px;height:6px;background:#5DC878;border-radius:50;display:inline-block;}
.npc{position:absolute;z-index:20;transition:left 2.5s ease-in-out, top 2.5s ease-in-out;filter:drop-shadow(0 3px 2px rgba(0,0,0,.2));}
.npc-name{position:absolute;top:-18px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:#e2e8f0;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:500;white-space:nowrap;backdrop-filter:blur(2px);display:flex;align-items:center;gap:3px;}
.npc-status{position:absolute;top:-32px;left:50%;transform:translateX(-50%);font-size:14px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));}
.chat-bubble{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);background:#fff;color:#333;padding:5px 10px;border-radius:12px;font-size:10px;font-weight:500;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:bubbleAnim 4s ease forwards;pointer-events:none;z-index:60;}
.chat-bubble::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:6px solid #fff;}
@keyframes bubbleAnim{0%{opacity:0;transform:translateX(-50%) translateY(4px);}8%{opacity:1;transform:translateX(-50%) translateY(0);}75%{opacity:1;}100%{opacity:0;}}

/* ═══ SIDEBAR ═══ */
.sidebar{width:260px;background:rgba(30,30,48,.97);backdrop-filter:blur(16px);border-left:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;flex-shrink:0;z-index:50;}
.sidebar-header{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;}
.sidebar-header h3{font-family:'Space Grotesk',sans-serif;font-size:14px;color:#e2e8f0;display:flex;align-items:center;gap:8px;}
.sidebar-close{background:rgba(255,255,255,.06);border:none;color:#94a3b8;width:26px;height:26px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;}
.sidebar-close:hover{background:rgba(108,92,231,.2);color:#a29bfe;}
.people-search{margin:10px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);color:#e2e8f0;padding:9px 14px;border-radius:10px;font-size:12px;font-family:inherit;outline:none;width:calc(100% - 28px);transition:border-color .2s;}
.people-search::placeholder{color:#64748b;}
.people-search:focus{border-color:rgba(108,92,231,.4);}
.people-list{flex:1;overflow-y:auto;padding:4px 14px;}
.people-section{margin-bottom:14px;}
.people-section-title{font-size:11px;color:#64748b;font-weight:600;padding:8px 0 4px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px;}
.people-section-title .count{background:rgba(255,255,255,.08);padding:2px 7px;border-radius:8px;font-size:10px;}
.person-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:10px;cursor:pointer;transition:background .15s;}
.person-row:hover{background:rgba(255,255,255,.04);}
.person-avatar{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;position:relative;}
.person-avatar .online-indicator{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;background:#5DC878;border:2px solid #1e1e30;border-radius:50%;}
.person-info{flex:1;min-width:0;}
.person-name{font-size:12px;color:#e2e8f0;font-weight:500;}
.person-role{font-size:10px;color:#64748b;}
.person-status-tag{font-size:9px;padding:3px 8px;border-radius:8px;font-weight:600;flex-shrink:0;}

/* ═══ BOTTOMBAR ═══ */
.bottombar{height:52px;background:rgba(30,30,48,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 18px;gap:14px;z-index:100;flex-shrink:0;}
.emoji-bar{display:flex;gap:4px;}
.emoji-btn{width:36px;height:36px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);border-radius:10px;font-size:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.emoji-btn:hover{background:rgba(108,92,231,.2);border-color:rgba(108,92,231,.3);transform:scale(1.12);}
.emoji-btn:active{transform:scale(.92);}
.bottom-actions{display:flex;gap:6px;margin-left:auto;}
.action-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);color:#94a3b8;padding:7px 16px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:all .15s;}
.action-btn:hover{background:rgba(108,92,231,.2);color:#a29bfe;border-color:rgba(108,92,231,.3);}
.move-hint{color:#475569;font-size:10px;display:flex;align-items:center;gap:5px;}
.key-icon{background:rgba(255,255,255,.08);color:#94a3b8;padding:3px 7px;border-radius:5px;font-size:9px;font-weight:700;font-family:'Space Grotesk',monospace;}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{transform:translateY(20px) scale(.97);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;}}
.modal{background:rgba(34,34,54,.98);border:1px solid rgba(255,255,255,.08);border-radius:20px;width:90%;max-width:500px;max-height:80vh;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5);animation:slideUp .25s ease;display:flex;flex-direction:column;backdrop-filter:blur(20px);}
.modal-header{padding:20px 22px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06);}
.modal-icon{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.modal-header h2{font-family:'Space Grotesk',sans-serif;font-size:17px;color:#e2e8f0;flex:1;font-weight:600;}
.modal-close{background:rgba(255,255,255,.06);border:none;width:32px;height:32px;border-radius:10px;color:#94a3b8;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{background:rgba(108,92,231,.2);color:#a29bfe;transform:rotate(90deg);}
.modal-body{padding:18px 22px 22px;overflow-y:auto;flex:1;}

/* modal content styles */
.mood-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.mood-btn{aspect-ratio:1;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.06);border-radius:14px;font-size:28px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.mood-btn span{font-size:9px;color:#64748b;}
.mood-btn:hover{border-color:rgba(108,92,231,.5);background:rgba(108,92,231,.1);transform:scale(1.04);}
.mood-btn.selected{border-color:#6C5CE7;background:rgba(108,92,231,.15);}
.mood-history{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px;}
.mood-history h4{font-size:12px;color:#64748b;margin-bottom:8px;}
.mood-entry{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;color:#cbd5e1;border-bottom:1px solid rgba(255,255,255,.04);}
.mood-entry:last-child{border:none;}
.kpi-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;margin-bottom:10px;}
.kpi-card h4{font-size:13px;color:#e2e8f0;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.kpi-bar-bg{height:16px;background:rgba(255,255,255,.06);border-radius:8px;overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:8px;transition:width 1s ease;position:relative;}
.kpi-bar-fill::after{content:attr(data-pct);position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3);}
.kpi-meta{display:flex;justify-content:space-between;margin-top:8px;font-size:10px;color:#64748b;}
.voc-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;transition:background .15s;}
.voc-card:hover{background:rgba(255,255,255,.05);}
.voc-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.voc-content h4{font-size:12px;color:#e2e8f0;margin-bottom:4px;}
.voc-content p{font-size:11px;color:#64748b;}
.voc-tag{display:inline-block;font-size:9px;padding:3px 8px;border-radius:8px;margin-top:6px;font-weight:600;}
.idea-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;margin-bottom:8px;transition:all .15s;}
.idea-card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);}
.idea-card h4{font-size:13px;color:#e2e8f0;margin-bottom:4px;}
.idea-card p{font-size:11px;color:#64748b;line-height:1.5;}
.idea-footer{display:flex;align-items:center;gap:10px;margin-top:10px;}
.idea-like{background:none;border:1.5px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 14px;font-size:11px;color:#94a3b8;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:4px;}
.idea-like:hover{border-color:#FF6B9D;color:#FF6B9D;}
.idea-like.liked{border-color:#FF6B9D;color:#FF6B9D;background:rgba(255,107,157,.08);}
.idea-author{font-size:10px;color:#475569;}
.input-row{display:flex;gap:8px;margin-top:14px;}
.input-row input{flex:1;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 14px;color:#e2e8f0;font-family:inherit;font-size:12px;outline:none;transition:border-color .2s;}
.input-row input:focus{border-color:rgba(108,92,231,.5);}
.input-row input::placeholder{color:#475569;}
.submit-btn{background:linear-gradient(135deg,#6C5CE7,#7c6df7);color:#fff;border:none;border-radius:12px;padding:10px 18px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;box-shadow:0 4px 12px rgba(108,92,231,.3);}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(108,92,231,.4);}

.toast{position:fixed;top:58px;left:50%;transform:translateX(-50%) translateY(-30px);background:rgba(108,92,231,.95);color:#fff;padding:10px 22px;border-radius:14px;font-size:12px;font-weight:600;z-index:300;opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 8px 24px rgba(108,92,231,.3);backdrop-filter:blur(8px);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.emoji-float{position:absolute;z-index:100;font-size:26px;pointer-events:none;animation:emojiRise 1.5s ease forwards;}
@keyframes emojiRise{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(1.4);}}
.prox-hint{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);background:rgba(108,92,231,.92);color:#fff;padding:8px 18px;border-radius:14px;font-size:12px;font-weight:600;z-index:90;animation:fadeIn .2s;display:flex;align-items:center;gap:8px;box-shadow:0 6px 20px rgba(108,92,231,.3);backdrop-filter:blur(8px);}
.prox-hint .key-icon{background:rgba(255,255,255,.2);color:#fff;}
.corridor{position:absolute;z-index:1;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px;}
</style>
</head>
<body>
<div id="app"></div>

    <rect x="17" y="35" width="4" height="6" rx="2" fill="#555"/>
    <rect x="10" y="39" width="5" height="3" rx="1.5" fill="${c}"/>
    <rect x="17" y="39" width="5" height="3" rx="1.5" fill="${c}"/>
    <circle cx="16" cy="14" r="10" fill="${sk}"/>
    <ellipse cx="16" cy="7" rx="10" ry="6" fill="${hr}"/>
    <ellipse cx="6.5" cy="10" rx="3" ry="5" fill="${hr}"/>
    <ellipse cx="25.5" cy="10" rx="3" ry="5" fill="${hr}"/>

    <circle cx="20" cy="14" r="2" fill="#333"/>

    <circle cx="20.7" cy="13.4" r=".8" fill="#fff"/>

      <ellipse cx="20" cy="30" rx="16" ry="20" fill="#43A047"/>
      <ellipse cx="12" cy="24" rx="8" ry="14" fill="#66BB6A"/>
      <ellipse cx="28" cy="26" rx="7" ry="12" fill="#388E3C"/>
      <ellipse cx="20" cy="18" rx="6" ry="10" fill="#4CAF50"/>
    </svg></div>`;
  }
  return `<div class="plant" style="left:${x}px;top:${y}px;"><svg width="22" height="30" viewBox="0 0 22 30">

function renderGround(){
  // Gather-style grass base with path patterns
  return `<svg width="1800" height="1200" style="position:absolute;top:0;left:0;">
    <defs>
      <pattern id="grass" width="16" height="16" patternUnits="userSpaceOnUse">
        <rect width="16" height="16" fill="#7da87d"/>
        <circle cx="4" cy="4" r="1" fill="#6b9a6b" opacity=".5"/>
        <circle cx="12" cy="12" r="1" fill="#8ab88a" opacity=".4"/>
        <circle cx="8" cy="2" r=".8" fill="#6b9a6b" opacity=".3"/>
      </pattern>
      <pattern id="path" width="32" height="32" patternUnits="userSpaceOnUse">
        <rect width="32" height="32" fill="#c8c0b0"/>
        <rect x="0" y="0" width="16" height="16" fill="#ccc4b4" opacity=".5"/>
        <rect x="16" y="16" width="16" height="16" fill="#ccc4b4" opacity=".5"/>
      </pattern>
    </defs>
    <rect width="1800" height="1200" fill="url(#grass)"/>
    <!-- paths/corridors -->
    <rect x="420" y="0" width="60" height="1200" fill="url(#path)" rx="2"/>
    <rect x="840" y="0" width="60" height="1200" fill="url(#path)" rx="2"/>
    <rect x="0" y="370" width="1800" height="60" fill="url(#path)" rx="2"/>
    <rect x="0" y="790" width="1800" height="60" fill="url(#path)" rx="2"/>
  </svg>`;
}

function renderRooms(){
  const rooms=[
    {x:60,y:60,w:360,h:300,f:'#f0ebe4',l:'💭 마음의소리',t:'조직유닛'},
    {x:480,y:60,w:360,h:300,f:'#e4eef0',l:'📊 KPI 관리실',t:'조직유닛'},
    {x:60,y:440,w:360,h:340,f:'#eee4f0',l:'📞 VOC 센터',t:'전체'},
    {x:480,y:440,w:360,h:340,f:'#f0eee4',l:'💡 아이디어 보드',t:'전체'},
    {x:900,y:60,w:320,h:380,f:'#e8e4f0',l:'☕ 라운지',t:'자유 공간'},
    {x:900,y:480,w:320,h:300,f:'#e4f0ec',l:'✉️ 쪽지함',t:'익명'},
    {x:900,y:840,w:320,h:180,f:'#e4e8f0',l:'🏢 회의실',t:'조직유닛'},
  ];
  let h='';
  rooms.forEach(r=>{
    h+=`<div class="room" style="left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px;">
      <div class="room-floor" style="background:${r.f};"></div>
      <div class="room-label">${r.l}</div>
      <div class="team-label">${r.t}</div>
    </div>`;
    // walls
    h+=`<div class="wall-h wall-top" style="left:${r.x}px;top:${r.y}px;width:${r.w}px;"></div>`;
    h+=`<div class="wall-h" style="left:${r.x}px;top:${r.y+r.h}px;width:${r.w}px;"></div>`;
    h+=`<div class="wall-v wall-top" style="left:${r.x}px;top:${r.y}px;height:${r.h}px;"></div>`;
    h+=`<div class="wall-v" style="left:${r.x+r.w}px;top:${r.y}px;height:${r.h}px;"></div>`;
  });
  return h;
}

function renderFurniture(){
  let h='';
  const desk=(x,y)=>`<div class="desk" style="left:${x}px;top:${y}px;"><div class="desk-wood"><div class="desk-top"></div></div></div>`;
  const mon=(x,y)=>`<div class="monitor" style="left:${x}px;top:${y}px;"><div class="monitor-body"><div class="monitor-screen"></div></div><div class="monitor-stand"></div></div>`;
  const chr=(x,y)=>`<div class="chair" style="left:${x}px;top:${y}px;"><div class="chair-seat"></div></div>`;
  const rt=(x,y,s=60)=>`<div class="round-table" style="left:${x}px;top:${y}px;width:${s}px;height:${s}px;"></div>`;
  const sfh=(x,y)=>`<div class="sofa sofa-h" style="left:${x}px;top:${y}px;"><div class="sofa-cushion"></div></div>`;
  const sfv=(x,y)=>`<div class="sofa sofa-v" style="left:${x}px;top:${y}px;"><div class="sofa-cushion"></div></div>`;
  const wb=(x,y,w=90)=>`<div class="whiteboard" style="left:${x}px;top:${y}px;width:${w}px;height:10px;"><div class="whiteboard-content"></div></div>`;
  const tv=(x,y)=>`<div class="tv-screen" style="left:${x}px;top:${y}px;width:64px;height:8px;"><div class="tv-glow"></div></div>`;
  const bs=(x,y)=>`<div class="bookshelf" style="left:${x}px;top:${y}px;"><div class="bookshelf-frame"><div class="books"><div class="book" style="width:4px;background:#e74c3c;"></div><div class="book" style="width:3px;background:#3498db;"></div><div class="book" style="width:5px;background:#f39c12;"></div><div class="book" style="width:3px;background:#2ecc71;"></div><div class="book" style="width:4px;background:#9b59b6;"></div><div class="book" style="width:3px;background:#e67e22;"></div></div></div></div>`;
  const vd=(x,y)=>`<div class="vending" style="left:${x}px;top:${y}px;"><div class="vending-slot"></div></div>`;
  const p=plantSVG;

  // ── 마음의소리 room ──
  h+=desk(120,120)+mon(140,110)+chr(140,172);
  h+=desk(250,120)+mon(270,110)+chr(270,172);
  h+=rt(170,240,54);
  h+=sfh(110,300)+sfh(240,300);
  h+=p(70,72)+p(70,320,'lg')+p(388,72)+p(388,310);

  // ── KPI room ──
  for(let i=0;i<3;i++){h+=desk(530+i*105,120)+mon(550+i*105,110)+chr(550+i*105,172);}
  for(let i=0;i<3;i++){h+=desk(530+i*105,230)+mon(550+i*105,220)+chr(550+i*105,282);}
  h+=wb(570,78)+p(478,72)+p(478,310)+p(808,72)+p(808,310);

  // ── VOC room ──
  h+=desk(120,510)+mon(140,500)+chr(140,562);
  h+=desk(250,510)+mon(270,500)+chr(270,562);
  h+=desk(120,620)+mon(140,610)+chr(140,672);
  h+=desk(250,620)+mon(270,610)+chr(270,672);
  h+=wb(180,460)+p(70,440,'lg')+p(388,440)+p(70,730)+p(388,730);

  // ── Idea Board ──
  h+=rt(550,540,56)+rt(700,540,56);
  h+=rt(550,670,56)+rt(700,670,56);
  h+=sfh(510,490)+sfh(660,490);
  h+=wb(560,460,120)+p(478,440)+p(808,440)+p(478,730)+p(808,730);

  // ── Lounge ──
  h+=sfv(920,100)+sfv(920,220);
  h+=rt(970,140,50)+rt(970,290,50);
  h+=vd(1140,80)+vd(1180,80);
  h+=bs(1080,78)+bs(1140,78);
  h+=p(910,380,'lg')+p(1180,380,'lg')+p(1180,100);

  // ── 쪽지함 room ──
  h+=desk(960,550)+mon(980,540)+chr(980,600);
  h+=desk(1080,550)+mon(1100,540)+chr(1100,600);
  h+=sfh(980,700);
  h+=p(910,490)+p(1190,490)+p(910,740)+p(1190,740);

  // ── 회의실 ──
  h+=`<div class="desk" style="left:980px;top:890px;"><div class="desk-wood" style="width:140px;height:54px;"><div class="desk-top"></div></div></div>`;
  for(let i=0;i<4;i++)h+=chr(990+i*35,870);
  for(let i=0;i<4;i++)h+=chr(990+i*35,950);
  h+=tv(1010,858)+p(910,840)+p(1190,840)+p(1190,990);

  return h;
}

function renderModalHTML(){
  const fns={mood:moodM,kpi:kpiM,voc:vocM,idea:ideaM,lounge:loungeM,note:noteM};
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${(fns[S.modal]||loungeM)()}</div></div>`;
}

function moodM(){
  return `${mH('💭','rgba(108,92,231,.2)','마음의소리')}<div class="modal-body">

function kpiM(){
  return `${mH('📊','rgba(41,182,246,.15)','KPI 관리실')}<div class="modal-body">
    <p style="font-size:12px;color:#64748b;margin-bottom:12px;">조직유닛 핵심 지표 현황</p>
    ${S.kpis.map(k=>{
      let pct=Math.min(100,(k.current/k.target)*100);
      const c=pct>=90?'linear-gradient(90deg,#4CAF50,#66BB6A)':pct>=70?'linear-gradient(90deg,#FF9800,#FFB74D)':'linear-gradient(90deg,#E91E63,#F06292)';
      return `<div class="kpi-card"><h4>${k.icon} ${k.title}</h4><div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:${pct}%;background:${c};" data-pct="${Math.round(pct)}%"></div></div><div class="kpi-meta"><span>현재: ${k.current}${k.unit}</span><span>목표: ${k.target}${k.unit}</span></div></div>`;
    }).join('')}
  </div>`;
}

  return `${mH('📞','rgba(76,175,80,.15)','VOC 센터')}<div class="modal-body">
    ${S.vocs.map(v=>`<div class="voc-card"><div class="voc-badge" style="background:${cl[v.type]||'#999'};">${v.type[0]}</div><div class="voc-content"><h4>${v.content}</h4><p>${v.dept} · ${v.status}</p><span class="voc-tag" style="background:${cl[v.type]}15;color:${cl[v.type]};">${v.type}</span></div></div>`).join('')}
    <div class="input-row"><input id="voc-input" placeholder="새 VOC 입력..."/><button class="submit-btn" onclick="addVOC()">등록</button></div>
  </div>`;
}

  return `${mH('☕','rgba(108,92,231,.15)','라운지')}<div class="modal-body"><div style="text-align:center;padding:30px 0;">
    <div style="font-size:60px;margin-bottom:14px;">☕</div>
    <h3 style="color:#e2e8f0;margin-bottom:8px;font-family:'Space Grotesk',sans-serif;">잠시 쉬어가세요</h3>
    <p style="color:#64748b;font-size:13px;">자판기에서 커피 한 잔, 소파에서 휴식!</p>
    <div style="margin-top:22px;display:flex;justify-content:center;gap:10px;">
      <button class="submit-btn" onclick="showToast('☕ 아메리카노 한 잔!');closeModal()">☕ 커피</button>
      <button class="submit-btn" style="background:linear-gradient(135deg,#FF6B9D,#ff8db5);" onclick="showToast('🍫 간식 획득!');closeModal()">🍫 간식</button>

// ACTIONS
function openModal(id){S.modal=id;render();}
function closeModal(){S.modal=null;S.selectedMood=null;render();}
function selectMood(idx){
  S.selectedMood=idx;const mood=MOODS[idx];
  const now=new Date();const time=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  S.moods=S.moods.filter(m=>m.name!=='나');
  S.moods.unshift({name:'나',emoji:mood.emoji,time});
  showToast(`${mood.emoji} "${mood.label}" 등록!`);
  S.modal='mood';render();
}
function addVOC(){const el=document.getElementById('voc-input');if(!el||!el.value.trim())return;S.vocs.unshift({type:'요청',content:el.value.trim(),dept:'증권ITO',status:'접수'});showToast('📞 VOC 등록!');S.modal='voc';render();}
function addIdea(){const t=document.getElementById('idea-title'),d=document.getElementById('idea-desc');if(!t||!t.value.trim())return;S.ideas.unshift({title:t.value.trim(),desc:d?d.value.trim():'',author:'나',likes:0,liked:false});showToast('💡 아이디어 공유!');S.modal='idea';render();}
function toggleLike(i){S.ideas[i].liked=!S.ideas[i].liked;S.ideas[i].likes+=S.ideas[i].liked?1:-1;S.modal='idea';render();}
function showToast(msg){setTimeout(()=>{const el=document.getElementById('toast');if(el){el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}},50);}
function floatEmoji(e){const mv=document.getElementById('mv');if(!mv)return;const el=document.createElement('div');el.className='emoji-float';el.textContent=e;el.style.left=(S.px+8)+'px';el.style.top=(S.py-10)+'px';mv.appendChild(el);setTimeout(()=>el.remove(),1500);}

// MOVEMENT
const SP=4;
document.addEventListener('keydown',e=>{if(S.modal)return;S.keys[e.key]=true;if(e.key===' '||e.key==='Enter'){e.preventDefault();if(S.nearZone)openModal(S.nearZone);}});
document.addEventListener('keyup',e=>{S.keys[e.key]=false;});

function gameLoop(){
  if(!S.modal){
    let dx=0,dy=0;
    if(S.keys['ArrowUp']||S.keys['w']||S.keys['W'])dy=-SP;
    if(S.keys['ArrowDown']||S.keys['s']||S.keys['S'])dy=SP;
    if(S.keys['ArrowLeft']||S.keys['a']||S.keys['A'])dx=-SP;
    if(S.keys['ArrowRight']||S.keys['d']||S.keys['D'])dx=SP;
    if(dx||dy){
      S.px=Math.max(20,Math.min(1760,S.px+dx));
      S.py=Math.max(20,Math.min(1160,S.py+dy));
      const pl=document.getElementById('player');
      if(pl){pl.style.left=S.px+'px';pl.style.top=S.py+'px';}
      centerCamera();
      checkZone();
    }
  }
  requestAnimationFrame(gameLoop);
}

function centerCamera(){
  const c=document.getElementById('mc'),v=document.getElementById('mv');
  if(!c||!v)return;
  const cw=c.clientWidth,ch=c.clientHeight;
  let ox=cw/2-S.px-17,oy=ch/2-S.py-22;
  ox=Math.min(0,Math.max(ox,cw-1800));
  oy=Math.min(0,Math.max(oy,ch-1200));
  v.style.transform=`translate(${ox}px,${oy}px)`;
}

function checkZone(){
  let near=null;const cx=S.px+17,cy=S.py+22;
  for(const z of ZONES){if(cx>z.x&&cx<z.x+z.w&&cy>z.y&&cy<z.y+z.h){near=z.id;break;}}
  if(near!==S.nearZone){
    S.nearZone=near;
    document.querySelectorAll('.prox-hint').forEach(e=>e.remove());
    if(near){
      const z=ZONES.find(z=>z.id===near);
      const el=document.createElement('div');el.className='prox-hint';
      el.innerHTML=`<span class="key-icon">Space</span> ${z.label} 입장`;
      document.getElementById('app').appendChild(el);
    }
  }
}

// NPC AI
function moveNPCs(){
  npcs.forEach((n,i)=>{
    if(Math.random()<.25){
      const z=ZONES[i%ZONES.length];
      n.x=z.x+40+Math.random()*(z.w-100);
      n.y=z.y+50+Math.random()*(z.h-120);
      const el=document.getElementById(`npc-${i}`);
      if(el){el.style.left=n.x+'px';el.style.top=n.y+'px';}
    }
  });
}
function spawnBubble(){
  const i=Math.floor(Math.random()*npcs.length);
  const msg=BUBBLES[Math.floor(Math.random()*BUBBLES.length)];
  const el=document.getElementById(`npc-${i}`);
  if(el){const old=el.querySelector('.chat-bubble');if(old)old.remove();
  const b=document.createElement('div');b.className='chat-bubble';b.textContent=msg;
  el.appendChild(b);setTimeout(()=>{if(b.parentNode)b.remove();},4000);}
}

render();gameLoop();
setInterval(moveNPCs,3500);
setInterval(spawnBubble,4000);
window.addEventListener('resize',centerCamera);
</script>
</body>
</html>
